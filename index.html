<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>가족 스케줄표</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#e8f0e8; --card:#f2f7f2; --text:#1a2a1a; --muted:#5a7a5a; --border:#a8c8a8;
  --both:#2a7a6a; --both-bg:#bce8e0; --both-dk:#145548;
  --school-bg:#d8f0d0; --school-fg:#1a5a18;
  --meal-bg:#f0f0c0;   --meal-fg:#504808;
  --sleep-bg:#c8e8f0;  --sleep-fg:#0a4858;
  --free-bg:#d8f0e0;   --free-fg:#0a5028;
  --warn:#b04040;
  --SH:3px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);
  height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  padding-top:env(safe-area-inset-top,0px);}

.app{display:flex;flex:1;min-height:0;}

/* ── SIDEBAR ── */
.sidebar{width:260px;flex-shrink:0;background:var(--card);border-right:2px solid var(--border);
  display:flex;flex-direction:column;height:100%;transition:transform .25s ease;position:relative;z-index:10;}
.sb-head{padding:12px 14px 8px;border-bottom:1px solid var(--border);}
.sb-head h2{font-size:.9rem;font-weight:700;}
.sb-head p{font-size:.66rem;color:var(--muted);line-height:1.5;margin-top:2px;}
.sb-members{padding:8px 10px;border-bottom:1px solid var(--border);}
.member-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.member-badge{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:50px;
  border:1px solid var(--border);background:var(--bg);flex:1;min-width:0;}
.member-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;cursor:pointer;
  border:2px solid rgba(0,0,0,.15);transition:transform .12s;}
.member-dot:hover{transform:scale(1.3);}
.member-name{font-family:'Noto Sans KR',sans-serif;font-size:.78rem;font-weight:500;
  color:var(--text);border:none;background:transparent;outline:none;flex:1;min-width:0;}
.member-del{border:none;background:transparent;cursor:pointer;color:var(--muted);
  font-size:.75rem;padding:2px 4px;flex-shrink:0;}
.member-del:hover{color:#c05050;}
.color-palette{display:none;position:fixed;background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:10px;box-shadow:0 6px 24px rgba(0,0,0,.14);z-index:2300;
  flex-wrap:wrap;gap:5px;width:210px;}
.color-palette.open{display:flex;}
.cp-swatch{width:24px;height:24px;border-radius:50%;border:2px solid transparent;
  cursor:pointer;transition:transform .12s,border-color .12s;}
.cp-swatch:hover{transform:scale(1.18);}
.cp-swatch.active{border-color:var(--text);}
.sb-add{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:5px;}
.add-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;
  padding:8px;border:1.5px dashed var(--border);border-radius:8px;background:transparent;
  cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.76rem;font-weight:500;
  color:var(--muted);transition:all .14s;}
.add-btn.primary{color:#2e8b57;}
.add-btn:hover{border-color:currentColor;background:rgba(0,0,0,.03);}
.lib-body{flex:1;overflow-y:auto;padding:8px 10px 16px;}
.lib-sec{margin-bottom:10px;}
.lib-sec-lbl{font-size:.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.4px;padding:3px 4px 4px;}
.lib-item{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:7px;
  border:1px solid var(--border);background:var(--bg);margin-bottom:3px;user-select:none;}
.lib-color{width:6px;height:30px;border-radius:3px;flex-shrink:0;}
.lib-info{flex:1;min-width:0;}
.lib-name{font-size:.76rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lib-meta{font-size:.62rem;color:var(--muted);margin-top:1px;}
.lib-days{font-size:.6rem;color:var(--muted);margin-top:1px;}
.lib-acts{display:flex;gap:2px;opacity:0;transition:opacity .12s;}
.lib-item:hover .lib-acts{opacity:1;}
.lib-act{background:transparent;border:none;cursor:pointer;padding:3px 6px;border-radius:4px;
  color:var(--muted);font-size:.72rem;transition:background .1s;}
.lib-act:hover{background:var(--border);color:var(--text);}
.lib-act.del:hover{background:#fde;color:#c05050;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.topbar{background:var(--card);border-bottom:2px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;gap:6px;}
.topbar-left{display:flex;align-items:center;gap:6px;min-width:0;}
.topbar-title{font-size:.9rem;font-weight:700;white-space:nowrap;}
.topbar-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.week-nav{display:flex;align-items:center;gap:1px;border:1px solid var(--border);
  border-radius:7px;background:var(--bg);padding:2px 3px;}
.week-nav-btn{border:none;background:transparent;cursor:pointer;font-size:.9rem;
  padding:2px 6px;color:var(--muted);border-radius:4px;}
.week-nav-btn:hover{background:var(--border);}
.date-lbl{font-size:.68rem;color:var(--muted);cursor:pointer;min-width:54px;text-align:center;}
.topbar-btn{display:flex;align-items:center;gap:4px;padding:5px 8px;border-radius:7px;
  border:1px solid var(--border);background:var(--bg);font-family:'Noto Sans KR',sans-serif;
  font-size:.72rem;color:var(--text);cursor:pointer;transition:all .14s;white-space:nowrap;}
.topbar-btn:hover{border-color:#2e8b57;color:#2e8b57;background:#d8f0d0;}
.menu-btn{display:none;}
.topbar-row2{padding:0 6px 6px;}
.day-tabs{display:flex;gap:1px;background:var(--bg);padding:2px;border-radius:8px;
  border:1px solid var(--border);width:100%;}
.day-tab{flex:1;min-width:0;padding:4px 2px;border-radius:5px;border:none;
  background:transparent;font-family:'Noto Sans KR',sans-serif;font-size:.62rem;
  color:var(--muted);cursor:pointer;transition:all .14s;line-height:1.4;text-align:center;}
.day-tab.active{background:var(--text);color:#fff;font-weight:500;}
.day-tab.we{color:#8a7060;}
.day-tab.we.active{background:#8a7060;color:#fff;}
.day-tab.week-tab.active{background:#2e8b57;color:#fff;}

/* ── GRID ── */
.grid-scroll{flex:1;overflow:auto;}
.grid-wrap{display:flex;padding:0 10px 40px;}
.time-gutter{width:44px;flex-shrink:0;position:sticky;left:0;z-index:10;background:var(--bg);}
.tg-head{height:34px;border-bottom:1px solid var(--border);}
.tl{height:var(--SH);display:flex;align-items:flex-start;padding-top:1px;font-size:.56rem;
  color:var(--muted);font-weight:300;white-space:nowrap;border-top:1px solid transparent;}
.tl.hour{color:var(--text);font-weight:500;font-size:.6rem;border-top-color:var(--border);}
.tl.half{border-top:1px dashed #c8d8c8;}
.cols-wrap{display:flex;flex:1;position:relative;}
.member-col{flex:1;min-width:90px;border-left:1px solid var(--border);}
.col-head{height:34px;display:flex;align-items:center;justify-content:center;gap:5px;
  border-bottom:1px solid var(--border);font-size:.76rem;font-weight:600;
  background:var(--card);position:sticky;top:0;z-index:5;}
.col-dot{width:8px;height:8px;border-radius:50%;}
.slots-grid{position:relative;}
.slot-row{height:var(--SH);border-top:1px solid transparent;position:absolute;left:0;right:0;}
.slot-row.hour{border-top-color:var(--border);}
.slot-row.half{border-top:1px dashed #d8e8d8;}

/* ── WEEK VIEW ── */
.week-scroll{flex:1;overflow:auto;}
.week-wrap{display:flex;padding:0 10px 40px;}
.week-gutter{width:44px;flex-shrink:0;position:sticky;left:0;z-index:10;background:var(--bg);}
.week-gutter .tg-head{height:40px;}
.week-cols{display:flex;flex:1;}
.week-day-group{display:flex;flex-direction:column;flex:1;min-width:80px;border-left:1px solid var(--border);}
.week-day-head{height:22px;display:flex;align-items:center;justify-content:center;gap:4px;
  border-bottom:1px solid var(--border);font-size:.7rem;font-weight:700;
  background:var(--card);position:sticky;top:0;z-index:6;}
.week-day-head.we{color:#8a7060;background:#f0ebe4;}
.wdate{font-size:.56rem;color:var(--muted);font-weight:300;margin-left:2px;}
.week-child-cols{display:flex;flex:1;position:relative;}
.week-col{flex:1;min-width:44px;}
.week-col:not(:first-child){border-left:1px dashed var(--border);}
.week-col-head{height:18px;display:flex;align-items:center;justify-content:center;
  border-bottom:1px solid var(--border);font-size:.58rem;font-weight:500;
  background:var(--card);position:sticky;top:22px;z-index:5;color:var(--muted);overflow:hidden;}
.week-slots{position:relative;}

/* ── EVENTS ── */
.ev{position:absolute;left:2px;right:2px;border-radius:5px;padding:2px 4px 2px 7px;
  font-size:.63rem;line-height:1.3;overflow:hidden;cursor:pointer;
  border-left:5px solid transparent;display:flex;flex-direction:column;
  transition:opacity .12s;}
.ev:hover{opacity:.75;}
.ev-title{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-time{font-size:.54rem;opacity:.75;margin-top:1px;}
.ev.school{background:var(--school-bg);color:var(--school-fg);}
.ev.meal  {background:var(--meal-bg);  color:var(--meal-fg);}
.ev.sleep {background:var(--sleep-bg); color:var(--sleep-fg);}
.ev.free  {background:var(--free-bg);  color:var(--free-fg);}
.ev.act   {background:var(--bg);       color:var(--text);}
.ev.overlap{outline:2px solid var(--warn);}
.ev-shared{position:absolute;left:2px;right:2px;border-radius:5px;padding:2px 6px 2px 9px;
  font-size:.63rem;line-height:1.3;overflow:hidden;cursor:pointer;
  border-left:5px solid var(--both);background:var(--both-bg);color:var(--both-dk);
  display:flex;flex-direction:column;z-index:3;transition:opacity .12s;}
.ev-shared:hover{opacity:.75;}
.ev-shared.overlap{outline:2px solid var(--warn);}
.now-line{position:absolute;left:0;right:0;height:2px;background:var(--warn);z-index:3;pointer-events:none;}
.now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;
  border-radius:50%;background:var(--warn);}
.empty-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;}
.empty-hint p{font-size:.7rem;color:var(--muted);line-height:2;}
.shared-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:1;overflow:hidden;}
.shared-overlay-inner{position:relative;pointer-events:auto;}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1a2a1a;color:#fff;border-radius:10px;padding:10px 18px;font-size:.78rem;
  line-height:1.5;z-index:2200;opacity:0;transition:all .25s;pointer-events:none;
  max-width:90vw;text-align:center;border-left:4px solid var(--warn);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;z-index:2000;}
.overlay.open{display:block;}
.modal{position:fixed;background:var(--card);border-radius:14px;padding:16px 18px 20px;
  width:340px;max-height:92vh;overflow-y:auto;
  box-shadow:0 8px 40px rgba(0,0,0,.18);animation:popIn .2s cubic-bezier(.34,1.2,.64,1) both;}
@keyframes popIn{from{transform:scale(.95);opacity:0;}to{transform:none;opacity:1;}}
.modal-drag{cursor:grab;padding-bottom:8px;margin-bottom:6px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;}
.modal-drag:active{cursor:grabbing;}
.modal-drag h3{font-size:.9rem;font-weight:600;}
.modal-drag-hint{font-size:.6rem;color:var(--muted);}
.modal-backdrop{position:fixed;inset:0;z-index:-1;}
.fg{margin-bottom:10px;}
.fg label{display:block;font-size:.65rem;font-weight:500;color:var(--muted);
  margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px;}
.fg input,.fg select{width:100%;padding:9px 11px;border:1px solid var(--border);
  border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:.86rem;
  background:var(--bg);color:var(--text);outline:none;transition:border-color .14s;
  -webkit-appearance:none;}
.fg input:focus,.fg select:focus{border-color:#2e8b57;}
.fg-row{display:flex;gap:8px;}
.fg-row .fg{flex:1;}
.tpick{display:flex;align-items:center;border:1px solid var(--border);border-radius:10px;
  background:var(--bg);overflow:hidden;}
.tpick select{flex:1;padding:9px 4px;border:none;background:transparent;
  font-family:'Noto Sans KR',sans-serif;font-size:.86rem;color:var(--text);
  outline:none;cursor:pointer;text-align:center;-webkit-appearance:none;}
.tpick select:focus{background:rgba(46,139,87,.1);}
.tpick-sep{color:var(--muted);font-size:.9rem;padding:0 2px;font-weight:600;}
.day-sel{display:flex;gap:4px;}
.day-btn{flex:1;height:32px;border-radius:7px;border:1px solid var(--border);
  background:var(--bg);font-family:'Noto Sans KR',sans-serif;font-size:.74rem;
  cursor:pointer;transition:all .12s;color:var(--muted);}
.day-btn.on{background:#2e8b57;border-color:#2e8b57;color:#fff;font-weight:600;}
.day-btn.we.on{background:#8a7060;border-color:#8a7060;color:#fff;}
.who-btns{display:flex;gap:5px;flex-wrap:wrap;}
.who-btn{flex:1;min-width:60px;padding:8px 4px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg);
  font-family:'Noto Sans KR',sans-serif;font-size:.76rem;cursor:pointer;
  transition:all .14s;color:var(--muted);}
.who-btn.sel{font-weight:600;}
.repeat-btns{display:flex;gap:4px;flex-wrap:wrap;}
.repeat-btn{flex:1;min-width:55px;padding:7px 3px;border-radius:8px;
  border:1.5px solid var(--border);background:var(--bg);
  font-family:'Noto Sans KR',sans-serif;font-size:.72rem;cursor:pointer;
  transition:all .14s;color:var(--muted);}
.repeat-btn.sel{background:#2e8b57;border-color:#2e8b57;color:#fff;font-weight:600;}
.modal-acts{display:flex;gap:7px;margin-top:14px;}
.btn{flex:1;padding:10px;border-radius:10px;font-family:'Noto Sans KR',sans-serif;
  font-size:.82rem;cursor:pointer;transition:all .14s;border:none;}
.btn-g{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
.btn-g:hover{color:var(--text);}
.btn-p{background:var(--text);color:#fff;font-weight:500;flex:2;}
.btn-p:hover{opacity:.82;}

/* ── CTX ── */
.ctx{display:none;position:fixed;background:var(--card);border-radius:10px;
  border:1px solid var(--border);box-shadow:0 6px 24px rgba(0,0,0,.12);
  z-index:2100;overflow:hidden;min-width:180px;}
.ctx.open{display:block;}
.ctx button{display:block;width:100%;padding:10px 14px;background:transparent;border:none;
  font-family:'Noto Sans KR',sans-serif;font-size:.78rem;color:var(--text);
  cursor:pointer;transition:background .1s;text-align:left;}
.ctx button:hover{background:var(--bg);}
.ctx button.del{color:#c05050;}
.ctx-div{height:1px;background:var(--border);}

/* ── SIDEBAR BACKDROP ── */
.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99;}
.sb-backdrop.open{display:block;}

/* ── PRINT ── */
@media print {
  body{height:auto;overflow:visible;}
  .sidebar,.topbar,.overlay,.ctx,.toast,.sb-backdrop{display:none!important;}
  .app,.main{display:block;}
  #viewArea{display:block;overflow:visible;}
  .grid-scroll,.week-scroll{overflow:visible;height:auto;}
  .grid-wrap,.week-wrap{padding:0;}
  .ev,.ev-shared{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  @page{margin:12mm;size:A4 landscape;}
}

/* ── MOBILE ── */
@media (max-width:640px) {
  .sidebar{position:fixed;left:0;top:0;height:100%;z-index:100;transform:translateX(-100%);width:280px;}
  .sidebar.open{transform:translateX(0);}
  .menu-btn{display:flex;}
  .topbar-row1{padding:5px 8px;}
  .topbar-title{font-size:.78rem;}
  .topbar-btn span{display:none;}
  .topbar-btn{padding:4px 7px;}
  .date-lbl{min-width:48px;font-size:.6rem;}
  .topbar-row2{padding:0 4px 5px;}
  .day-tabs{gap:1px;padding:2px;}
  .day-tab{font-size:.56rem;padding:4px 1px;}
  .grid-wrap,.week-wrap{padding:0 4px 40px;}
  .member-col{min-width:75px;}
  .week-col{min-width:40px;}
  .ev,.ev-shared{font-size:.58rem;left:1px;right:1px;}
  #saveBadge{display:none;}
}
@media (max-width:380px) {
  .topbar-title{display:none;}
}
</style>
</head>
<body>
<div class="sb-backdrop" id="sbBackdrop" onclick="closeSidebar()"></div>
<div class="app">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <h2>일정 목록</h2>
    <p>저장하면 선택한 요일에 자동으로 추가됩니다</p>
  </div>
  <div class="sb-members" id="sbMembers"></div>
  <div class="sb-add">
    <button class="add-btn primary" onclick="openLibOv()">＋ 새 일정 만들기</button>
    <button class="add-btn" onclick="addMember()">＋ 멤버 추가</button>
  </div>
  <div class="lib-body" id="libBody"></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-row1">
      <div class="topbar-left">
        <button class="topbar-btn menu-btn" onclick="toggleSidebar()">☰</button>
        <span class="topbar-title">가족 스케줄표</span>
      </div>
      <div class="topbar-right">
        <div class="week-nav">
          <button class="week-nav-btn" onclick="changeWeek(-1)" title="이전 주">‹</button>
          <span class="date-lbl" id="dateLbl" onclick="changeWeek(0)" title="오늘로"></span>
          <button class="week-nav-btn" onclick="changeWeek(1)" title="다음 주">›</button>
        </div>
        <button class="topbar-btn" onclick="doShare()" id="shareBtn">🔗 <span>링크 공유</span></button>
        <button class="topbar-btn" onclick="window.print()">🖨 <span>인쇄</span></button>
        <span id="saveBadge" style="font-size:.62rem;color:var(--muted);white-space:nowrap;"></span>
      </div>
    </div>
    <div class="topbar-row2">
      <div class="day-tabs" id="dayTabs"></div>
    </div>
  </div>
  <div id="viewArea" style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<!-- MODAL: 일정 만들기 -->
<div class="overlay" id="libOv">
  <div class="modal-backdrop" onclick="closeLibOv()"></div>
  <div class="modal" id="libModal">
    <div class="modal-drag" id="libDragHandle">
      <h3 id="libTitle">일정 만들기</h3>
      <span class="modal-drag-hint">⠿ 드래그</span>
    </div>
    <div class="fg">
      <label>이름</label>
      <input type="text" id="lName" placeholder="예: 피아노, 저녁 식사…" maxlength="16">
    </div>
    <div class="fg">
      <label>종류</label>
      <div style="display:flex;gap:6px;">
        <button class="who-btn" id="evType_single" onclick="setEvType('single')" style="flex:1">당일</button>
        <button class="who-btn" id="evType_multi"  onclick="setEvType('multi')"  style="flex:1">🌙 숙박</button>
      </div>
    </div>
    <div id="singleTimeRow" class="fg">
      <label>시간</label>
      <div class="fg-row">
        <div class="fg"><label style="font-size:.6rem;color:var(--muted)">시작</label><div class="tpick" id="tpLS"></div></div>
        <div class="fg"><label style="font-size:.6rem;color:var(--muted)">종료</label><div class="tpick" id="tpLE"></div></div>
      </div>
    </div>
    <div id="multiTimeRow" style="display:none;">
      <div class="fg">
        <label>출발</label>
        <div class="fg-row">
          <div class="fg"><label style="font-size:.6rem;color:var(--muted)">요일</label>
            <select id="multiStartDay" onchange="updMonthWeekPreview()" style="padding:8px 10px;border:1px solid var(--border);border-radius:10px;font-family:inherit;font-size:.82rem;background:var(--bg);color:var(--text);width:100%;">
              <option value="0">월</option><option value="1">화</option><option value="2">수</option>

<div class="ctx" id="ctx">
  <div id="ctxTitle" style="padding:8px 14px 6px;font-size:.8rem;font-weight:600;color:var(--text);border-bottom:1px solid var(--border);"></div>

  <div class="ctx-div"></div>
  <button class="del" onclick="ctxDel()">삭제</button>

<script>
// ── 상수 ──────────────────────────────────────────────────
const DAYS   = ['월','화','수','목','금','토','일'];
const IS_WE  = [0,0,0,0,0,1,1];
const S_MIN  = 6*60, E_MIN = 23*60, SLOT = 5, SH = 3;
const TOTAL  = (E_MIN - S_MIN) / SLOT;
const SAVE_KEY = 'family_schedule_v1';
const PALETTE = [
  '#e05050','#e87878','#e8507a','#c03060','#e07830',
  '#f0a050','#f4c870','#b8a020','#2e8b57','#50a870',
  '#208050','#2070a0','#3090c0','#1858a0','#304898',
  '#7848c0','#9860d8','#604898','#d038a0','#c050d0',
  '#c86848','#a84830','#8a5030','#208870','#38a888',
  '#50c0a0','#186858','#e060b8','#883090','#b078e0',
];

// ── 상태 ──────────────────────────────────────────────────
let members = [
  {id:'m0', name:'', color:'#2e8b57'},
  {id:'m1', name:'', color:'#2070a0'},
];
let memberSeq = 2;
let library   = [];
let sched     = {};       // sched[dayIdx][memberId] = [events]
let libSeq    = 0, evSeq = 0;
let weekOffset = 0;
let curDay    = (()=>{ const d=new Date().getDay(); return d===0?6:d-1; })();
let viewMode  = 'day';
let weekExceptions = {}; // {weekKey: {evId: {skip,s,e}}}

// 모달 상태
let libEditId = null;
let whoSel    = [];       // 선택된 멤버 id 배열
let daysSel   = [];
let repeatSel = 'every';
let evTypeSel = 'single';
let monthWeekSel = 1;
let editEvCtx = null;
let skipEvCtx = null;
let ctxInfo   = null;
let toastTimer = null;

// ── 초기화 ────────────────────────────────────────────────
function initSched() {
  for (let d=0;d<7;d++) {
    if (!sched[d]) sched[d] = {};
    members.forEach(m => { if (!sched[d][m.id]) sched[d][m.id] = []; });
  }
}
initSched();

// window 브릿지 (Firestore module과 공유)
let lastSaved = 0;
window._getAppState = () => ({ members, memberSeq, library, sched, libSeq, evSeq, weekExceptions, lastSaved });
window._setAppState_orig = window._setAppState;
window._setAppState = (s) => {
  if (s.members)    { members = s.members; memberSeq = s.memberSeq || members.length; }
  if (s.library)    library = s.library;
  if (s.sched)      sched   = s.sched;
  if (s.libSeq != null) libSeq = s.libSeq;
  if (s.evSeq  != null) evSeq  = s.evSeq;
  if (s.weekExceptions) weekExceptions = s.weekExceptions;
  if (s.lastSaved)  lastSaved = s.lastSaved;
};
window._renderAll = () => {
  sanitizeData();
  renderMembers();
  buildTabs();
  renderLib();
  renderView();
};

// ── 색상 유틸 ─────────────────────────────────────────────
function hexToRgb(hex) {
  return {r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};
}
function lighten(hex, amt=0.72) {
  const {r,g,b}=hexToRgb(hex);
  const m=c=>Math.round(c+(255-c)*amt);
  return `rgb(${m(r)},${m(g)},${m(b)})`;
}
function darken(hex, amt=0.3) {
  const {r,g,b}=hexToRgb(hex);
  const m=c=>Math.round(c*(1-amt));
  return `rgb(${m(r)},${m(g)},${m(b)})`;
}
function applyMemberCSS(m) {
  const r = document.documentElement.style;
  r.setProperty(`--m_${m.id}`,      m.color);
  r.setProperty(`--m_${m.id}_bg`,   lighten(m.color));
  r.setProperty(`--m_${m.id}_dk`,   darken(m.color));
}
function applyAllMemberCSS() { members.forEach(applyMemberCSS); }

function getMember(id) { return members.find(m=>m.id===id); }

// ── 유틸 ──────────────────────────────────────────────────
const minY  = m => ((m - S_MIN) / SLOT) * SH;
const fmt   = m => `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
const snap5 = m => Math.round(m/SLOT)*SLOT;

function getMonday(off=0) {
  const now=new Date(), mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7)+off*7);
  mon.setHours(0,0,0,0);
  return mon;
}
function weekDates() {
  const mon=getMonday(weekOffset);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return{m:d.getMonth()+1,d:d.getDate()};});
}
function fullDate(idx) {
  const mon=getMonday(weekOffset), d=new Date(mon);
  d.setDate(mon.getDate()+idx);
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}
function getViewWeekKey() { return getMonday(weekOffset).toISOString().slice(0,10); }
function getTodayWeekKey() { return getMonday(0).toISOString().slice(0,10); }

function isNthWeekdayOfMonth(n, di) {
  const mon=getMonday(weekOffset), d=new Date(mon);
  d.setDate(mon.getDate()+di);
  return Math.ceil(d.getDate()/7) === n;
}

// ── 예외 처리 ─────────────────────────────────────────────
function getExc(evId) {
  const wk=getViewWeekKey();
  return weekExceptions[wk] && weekExceptions[wk][evId];
}
function setExc(evId, val) {
  const wk=getViewWeekKey();
  if (!weekExceptions[wk]) weekExceptions[wk]={};
  weekExceptions[wk][evId]=val;
}
function clearExc(evId) {
  const wk=getViewWeekKey();
  if (weekExceptions[wk]) delete weekExceptions[wk][evId];
}

// ── who 처리 ──────────────────────────────────────────────
function resolveWho(who) {
  if (who==='all' || who==='both') return members.map(m=>m.id);
  if (who==='child1' && members[0]) return [members[0].id];
  if (who==='child2' && members[1]) return [members[1].id];
  if (Array.isArray(who)) return who;
  return [who];
}
function isShared(who) {
  const t=resolveWho(who);
  return t.length>1;
}

// ── Toast ──────────────────────────────────────────────────
function showToast(msg) {
  const el=document.getElementById('toast');
  el.innerHTML=msg; el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),4000);
}

// ── 멤버 렌더 ─────────────────────────────────────────────
function renderMembers() {
  const el=document.getElementById('sbMembers');
  if (!el) return;
  el.innerHTML = members.map(m=>`
    <div class="member-row">
      <div class="member-badge">
        <div class="member-dot" id="dot_${m.id}" style="background:${m.color}"
          onclick="togglePalette('${m.id}',event)"></div>
        <input class="member-name" placeholder="이름" maxlength="8" value="${m.name}"
          oninput="onMemberName('${m.id}',this.value)">
        ${members.length>1?`<button class="member-del" onclick="removeMember('${m.id}')" title="삭제">✕</button>`:''}
      </div>
      <div class="color-palette" id="palette_${m.id}"></div>
    </div>
  `).join('');
  members.forEach(m=>buildPalette(m.id));
  applyAllMemberCSS();
}

function buildPalette(mid) {
  const el=document.getElementById('palette_'+mid);
  if (!el) return;
  const m=getMember(mid);
  if (!m) return;
  el.innerHTML=PALETTE.map(c=>`<div class="cp-swatch${c===m.color?' active':''}"
    style="background:${c}" onclick="pickColor('${mid}','${c}',event)"></div>`).join('');
}

function togglePalette(mid, e) {
  e.stopPropagation();
  const el=document.getElementById('palette_'+mid);
  const dot=document.getElementById('dot_'+mid);
  const rect=dot.getBoundingClientRect();
  el.style.left=rect.left+'px';
  el.style.top=(rect.bottom+4)+'px';
  buildPalette(mid);
  const wasOpen=el.classList.contains('open');
  document.querySelectorAll('.color-palette').forEach(p=>p.classList.remove('open'));
  if (!wasOpen) el.classList.add('open');
}
function pickColor(mid, hex, e) {
  e.stopPropagation();
  const m=getMember(mid);
  if (m) { m.color=hex; applyMemberCSS(m); buildPalette(mid); renderLib(); renderView(); autoSave(); }
  document.getElementById('palette_'+mid).classList.remove('open');
}
function closePalettes() { document.querySelectorAll('.color-palette').forEach(p=>p.classList.remove('open')); }

function onMemberName(mid, val) {
  const m=getMember(mid);
  if (m) { m.name=val; renderLib(); renderView(); buildTabs(); autoSave(); }
}

function addMember() {
  const colors=['#c86848','#9848b8','#d038a0','#3090c0','#f4c870','#208870'];
  const color=colors[memberSeq%colors.length];
  const id='m'+memberSeq++;
  members.push({id,name:'',color});
  for (let d=0;d<7;d++) { if (!sched[d]) sched[d]={}; sched[d][id]=[]; }
  applyMemberCSS({id,color});
  renderMembers(); renderLib(); renderView(); buildTabs(); autoSave();
}

function removeMember(mid) {
  if (members.length<=1) { showToast('⚠️ 최소 1명은 있어야 해요'); return; }
  library=library.filter(it=>{
    const t=resolveWho(it.who);
    return !t.includes(mid) || t.length>1;
  });
  for (let d=0;d<7;d++) {
    delete sched[d][mid];
    Object.keys(sched[d]).forEach(ck=>{
      sched[d][ck]=sched[d][ck].filter(ev=>{
        const t=resolveWho(ev.who);
        return !t.includes(mid);
      });
    });
  }
  members=members.filter(m=>m.id!==mid);
  renderMembers(); renderLib(); renderView(); buildTabs(); autoSave();
}

// ── 라이브러리 렌더 ───────────────────────────────────────
function memberColor(who) {
  const t=resolveWho(who);
  if (t.length>1) return 'var(--both)';
  const m=getMember(t[0]);
  return m?m.color:'var(--muted)';
}

function renderLib() {
  const el=document.getElementById('libBody');
  if (!library.length) {
    el.innerHTML=`<div style="padding:18px 6px;text-align:center"><p style="font-size:.73rem;color:var(--muted);line-height:2.1">아직 일정이 없어요.<br>위 버튼으로 만들어 보세요.</p></div>`;
    return;
  }
  // 멤버별 + 공통 그룹
  const groups=[
    ...members.map(m=>({
      label:m.name||'멤버', color:m.color,
      items:library.filter(it=>{
        const t=resolveWho(it.who);
        return t.length===1 && t[0]===m.id;
      })
    })),
    { label:'공통', color:'var(--both)',
      items:library.filter(it=>resolveWho(it.who).length>1) }
  ];
  let html='';
  groups.forEach(g=>{
    if (!g.items.length) return;
    html+=`<div class="lib-sec"><div class="lib-sec-lbl">${g.label}</div>`;
    g.items.forEach(it=>{
      const dStr=it.days&&it.days.length?it.days.map(d=>DAYS[d]).join(' '):'요일 없음';
      const repeatMap={week:'이번주만',every:'매주',month:'매달',monthweek:`매월 ${it.monthWeek||1}번째`};
      const repeatStr=repeatMap[it.repeat]||'매주';
      const timeStr=it.multiDay
        ?`${DAYS[it.multiDay.startDi]} ${fmt(it.ds)} → ${DAYS[it.multiDay.endDi]} ${fmt(it.de)}`
        :`${fmt(it.ds)} – ${fmt(it.de)}`;
      html+=`<div class="lib-item">
        <div class="lib-color" style="background:${g.color}"></div>
        <div class="lib-info">
          <div class="lib-name">${it.name}</div>
          <div class="lib-meta">${timeStr}</div>
          <div class="lib-days">${it.multiDay?'':dStr+' · '}${repeatStr}</div>
        </div>
        <div class="lib-acts">
          <button class="lib-act" onclick="openLibOv(${it.id})">✎</button>
          <button class="lib-act del" onclick="delLib(${it.id})">✕</button>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  el.innerHTML=html;
}

// ── 라이브러리 모달 ───────────────────────────────────────
function openLibOv(id=null) {
  libEditId=id;
  whoSel=members.map(m=>m.id);
  daysSel=[];
  repeatSel='every';
  evTypeSel='single';
  monthWeekSel=1;
  if (id) {
    const it=library.find(i=>i.id===id);
    if (!it) return;
    document.getElementById('libTitle').textContent='일정 수정';
    document.getElementById('lName').value=it.name;
    document.getElementById('lType').value=it.type;
    whoSel=Array.isArray(it.who)?[...it.who]:(it.who==='all'||it.who==='both'?members.map(m=>m.id):[it.who]);
    daysSel=[...(it.days||[])];
    repeatSel=it.repeat||'every';
    monthWeekSel=it.monthWeek||1;
    evTypeSel=it.multiDay?'multi':'single';
    buildPicker('tpLS',it.ds||9*60); buildPicker('tpLE',it.de||10*60);
    if (it.multiDay) {
      buildPicker('tpMLS',it.ds||9*60); buildPicker('tpMLE',it.de||17*60);
      const sd=document.getElementById('multiStartDay');
      const ed=document.getElementById('multiEndDay');
      if (sd) sd.value=it.multiDay.startDi;
      if (ed) ed.value=it.multiDay.endDi;
    }
  } else {
    document.getElementById('libTitle').textContent='일정 만들기';
    document.getElementById('lName').value='';
    document.getElementById('lType').value='act';
    buildPicker('tpLS',9*60); buildPicker('tpLE',10*60);
    buildPicker('tpMLS',9*60); buildPicker('tpMLE',17*60);
  }
  updEvType(); updWho(); updRepeat(); buildDaySel();
  document.getElementById('libOv').classList.add('open');
  positionModal('libModal');
  closeSidebar();
  setTimeout(()=>document.getElementById('lName').focus(),80);
}
function closeLibOv() { document.getElementById('libOv').classList.remove('open'); }

function setEvType(t) { evTypeSel=t; updEvType(); }
function updEvType() {
  document.getElementById('evType_single').className='who-btn'+(evTypeSel==='single'?' sel':'');
  document.getElementById('evType_multi').className ='who-btn'+(evTypeSel==='multi'?' sel':'');
  document.getElementById('singleTimeRow').style.display=evTypeSel==='single'?'':'none';
  document.getElementById('multiTimeRow').style.display =evTypeSel==='multi' ?'':'none';
  document.getElementById('fgDaySel').style.display=evTypeSel==='multi'?'none':'';
  document.getElementById('fgRepeat').style.display='';
}

function updWho() {
  const el=document.getElementById('whoBtns');
  if (!el) return;
  let html=members.map(m=>{
    const sel=whoSel.includes(m.id);
    return `<button class="who-btn${sel?' sel':''}"
      style="${sel?`background:${lighten(m.color)};border-color:${m.color};color:${darken(m.color)};`:''}"
      onclick="toggleWho('${m.id}')">${m.name||'멤버'}</button>`;
  }).join('');
  html+=`<button class="who-btn${whoSel.length===members.length?' sel':''}"
    style="${whoSel.length===members.length?'background:var(--both-bg);border-color:var(--both);color:var(--both-dk);':''}"
    onclick="toggleWhoAll()">전체</button>`;
  el.innerHTML=html;
  updMonthWeekPreview();
}
function toggleWho(mid) {
  const idx=whoSel.indexOf(mid);
  if (idx>=0) whoSel.splice(idx,1); else whoSel.push(mid);
  updWho();
}
function toggleWhoAll() {
  whoSel=whoSel.length===members.length?[]:members.map(m=>m.id);
  updWho();
}

function setRepeat(r) { repeatSel=r; updRepeat(); }
function setMonthWeek(n) { monthWeekSel=n; updRepeat(); }
function updRepeat() {
  ['week','every','month','monthweek'].forEach(r=>{
    const btn=document.getElementById('rp_'+r);
    if (btn) btn.className='repeat-btn'+(repeatSel===r?' sel':'');
  });
  const fgMW=document.getElementById('fgMonthWeek');
  if (fgMW) fgMW.style.display=repeatSel==='monthweek'?'':'none';
  [1,2,3,4,5].forEach(n=>{
    const btn=document.getElementById('mw_'+n);
    if (btn) btn.className='day-btn'+(monthWeekSel===n?' on':'');
  });
  const fg=document.getElementById('fgDaySel');
  if (fg) fg.style.display=(repeatSel==='month'||repeatSel==='monthweek')?'none':'';
  updMonthWeekPreview();
}
function updMonthWeekPreview() {
  const lbl=document.getElementById('mwPreviewLbl');
  if (!lbl) return;
  if (repeatSel!=='monthweek') { lbl.textContent=''; return; }
  const nth=['','첫','두','세','네','다섯'][monthWeekSel]||monthWeekSel+'번째';
  let dayName='';
  if (evTypeSel==='multi') {
    const sd=document.getElementById('multiStartDay');
    if (sd) dayName=DAYS[parseInt(sd.value)];
  } else if (daysSel.length>0) {
    dayName=daysSel.map(d=>DAYS[d]).join(',');
  }
  lbl.textContent=dayName?`→ 매월 ${nth}번째 ${dayName}요일`:`→ 매월 ${nth}번째 (요일 선택 필요)`;
}

function buildDaySel() {
  const el=document.getElementById('daySel');
  if (!el) return;
  el.innerHTML=DAYS.map((d,i)=>`<button class="day-btn${IS_WE[i]?' we':''}${daysSel.includes(i)?' on':''}"
    onclick="toggleDay(${i})">${d}</button>`).join('');
}
function toggleDay(i) {
  const idx=daysSel.indexOf(i);
  if (idx>=0) daysSel.splice(idx,1); else daysSel.push(i);
  buildDaySel(); updMonthWeekPreview();
}

function saveLib() {
  const name=document.getElementById('lName').value.trim();
  if (!name) { document.getElementById('lName').focus(); return; }
  if (whoSel.length===0) { showToast('⚠️ 대상 멤버를 선택해주세요'); return; }

  const type=document.getElementById('lType').value;
  let ds, de, multiDay=null;

  if (evTypeSel==='multi') {
    const startDi=parseInt(document.getElementById('multiStartDay').value);
    const endDi  =parseInt(document.getElementById('multiEndDay').value);
    ds=snap5(getPickerVal('tpMLS'));
    de=snap5(getPickerVal('tpMLE'));
    const nights=endDi>=startDi?endDi-startDi:7-startDi+endDi;
    if (nights===0&&de<=ds) { showToast('⚠️ 도착 시간이 출발 시간보다 늦어야 합니다'); return; }
    multiDay={startDi,endDi,nights};
  } else {
    ds=snap5(getPickerVal('tpLS'));
    de=snap5(getPickerVal('tpLE'));
    if (de<=ds) { showToast('⚠️ 종료 시간이 시작 시간보다 늦어야 합니다'); return; }
  }

  const who=whoSel.length===members.length?'all':whoSel.length===1?whoSel[0]:[...whoSel];
  const days=multiDay?[]:[...daysSel];
  const monthWeek=repeatSel==='monthweek'?monthWeekSel:null;

  if (libEditId) {
    const it=library.find(i=>i.id===libEditId);
    if (it) {
      for (let d=0;d<7;d++) {
        members.forEach(m=>{ if (sched[d]&&sched[d][m.id]) sched[d][m.id]=sched[d][m.id].filter(e=>e.lid!==libEditId); });
      }
      Object.assign(it,{name,ds,de,type,who,days,repeat:repeatSel,multiDay,monthWeek});
      addToSchedule(it);
    }
  } else {
    const it={id:++libSeq,name,ds,de,type,who,days,repeat:repeatSel,multiDay,monthWeek};
    library.push(it);
    addToSchedule(it);
  }
  closeLibOv(); renderLib(); renderView(); autoSave();
}

function delLib(id) {
  library=library.filter(i=>i.id!==id);
  for (let d=0;d<7;d++) {
    members.forEach(m=>{ if (sched[d]&&sched[d][m.id]) sched[d][m.id]=sched[d][m.id].filter(e=>e.lid!==id); });
    markOverlaps(d);
  }
  renderLib(); renderView(); autoSave();
}

function addToSchedule(it) {
  const targets=resolveWho(it.who);

  // 숙박 일정
  if (it.multiDay) {
    const wk=it.repeat==='week'?getViewWeekKey():null;
    const {startDi,endDi,nights}=it.multiDay;
    targets.forEach(mid=>{
      for (let n=0;n<=nights;n++) {
        const di=(startDi+n)%7;
        let s,e;
        if (n===0)          {s=it.ds;e=E_MIN;}
        else if (n===nights){s=S_MIN;e=it.de;}
        else                {s=S_MIN;e=E_MIN;}
        if (!sched[di]) sched[di]={};
        if (!sched[di][mid]) sched[di][mid]=[];
        const ev={id:++evSeq,lid:it.id,name:it.name,s,e,type:it.type,who:it.who,
          _multiDay:true,_part:n===0?'start':n===nights?'end':'mid',
          ...(wk?{_weekOnly:wk}:{}),
          ...(it.monthWeek?{_monthWeek:it.monthWeek}:{})};
        sched[di][mid].push(ev);
        markOverlaps(di);
      }
    });
    return;
  }

  // 이번주만
  if (it.repeat==='week') {
    const wk=getViewWeekKey();
    targets.forEach(mid=>{
      it.days.forEach(di=>{
        if (!sched[di]) sched[di]={};
        if (!sched[di][mid]) sched[di][mid]=[];
        sched[di][mid].push({id:++evSeq,lid:it.id,name:it.name,s:it.ds,e:it.de,
          type:it.type,who:it.who,_weekOnly:wk});
        markOverlaps(di);
      });
    });
    return;
  }

  // 매주/매달/매월N째
  it.days.forEach(di=>{
    targets.forEach(mid=>{
      if (!sched[di]) sched[di]={};
      if (!sched[di][mid]) sched[di][mid]=[];
      const ev={id:++evSeq,lid:it.id,name:it.name,s:it.ds,e:it.de,type:it.type,who:it.who,
        ...(it.monthWeek?{_monthWeek:it.monthWeek}:{})};
      sched[di][mid].push(ev);
    });
    markOverlaps(di);
  });
}

// ── 겹침 ─────────────────────────────────────────────────
function checkOverlap(di, mid, newEv, excludeId=null) {
  return ((sched[di]&&sched[di][mid])||[]).filter(e=>e.id!==excludeId&&newEv.s<e.e&&newEv.e>e.s);
}
function markOverlaps(di) {
  members.forEach(m=>{
    const evs=(sched[di]&&sched[di][m.id])||[];
    evs.forEach(e=>{e._overlap=false;});
  });
}
function computeOverlaps(di, mid) {
  // own 이벤트 + shared 이벤트 합쳐서 겹침 계산
  const own=((sched[di]&&sched[di][mid])||[]).filter(ev=>!isShared(ev.who));
  const shared=getShared(di);
  const all=[...own,...shared];
  const visible=all.filter(ev=>isEvVisible(ev,di));
  const times=visible.map(ev=>{
    const exc=getExc(ev.id);
    return {id:ev.id,s:exc&&exc.s!=null?exc.s:ev.s,e:exc&&exc.e!=null?exc.e:ev.e};
  });
  const overSet=new Set();
  for (let i=0;i<times.length;i++)
    for (let j=i+1;j<times.length;j++)
      if (times[i].s<times[j].e&&times[i].e>times[j].s) { overSet.add(times[i].id); overSet.add(times[j].id); }

  // rank 계산
  const result=new Map();
  const overList=times.filter(t=>overSet.has(t.id)).sort((a,b)=>a.s-b.s);
  const parent={};
  overList.forEach(t=>parent[t.id]=t.id);
  function find(x){return parent[x]===x?x:(parent[x]=find(parent[x]));}
  for (let i=0;i<times.length;i++)
    for (let j=i+1;j<times.length;j++)
      if (overSet.has(times[i].id)&&overSet.has(times[j].id)&&times[i].s<times[j].e&&times[i].e>times[j].s)
        parent[find(times[i].id)]=find(times[j].id);
  const clusters={};
  overList.forEach(t=>{const r=find(t.id);if(!clusters[r])clusters[r]=[];clusters[r].push(t);});
  Object.values(clusters).forEach(cl=>{
    cl.sort((a,b)=>a.s-b.s);
    cl.forEach((t,rank)=>result.set(t.id,{rank,total:cl.length}));
  });
  return result;
}

function getShared(di) {
  if (!members.length) return [];
  // 모든 멤버의 sched에서 shared 이벤트 수집 (lid 기준 중복 제거)
  const seen = new Set();
  const result = [];
  members.forEach(m => {
    ((sched[di]&&sched[di][m.id])||[]).forEach(ev => {
      if (isShared(ev.who) && !seen.has(ev.lid)) {
        seen.add(ev.lid);
        result.push(ev);
      }
    });
  });
  return result;
}

function isEvVisible(ev, di) {
  if (ev._weekOnly && ev._weekOnly!==getViewWeekKey()) return false;
  if (ev._monthWeek && !isNthWeekdayOfMonth(ev._monthWeek,di)) return false;
  const exc=getExc(ev.id);
  if (exc&&exc.skip) return false;
  return true;
}

// ── 이벤트 HTML ───────────────────────────────────────────
function evHtml(ev, di, mid, overMap) {
  if (!isEvVisible(ev, di)) return '';
  const exc=getExc(ev.id);
  const s=exc&&exc.s!=null?exc.s:ev.s;
  const e=exc&&exc.e!=null?exc.e:ev.e;
  const isExc=!!exc;
  const info=overMap?overMap.get(ev.id):null;
  const isOver=!!info;
  const rank=info?info.rank:0;
  const total=info?info.total:1;
  const top=minY(s), h=Math.max(minY(e)-top,SH);
  const zIdx=isOver?(100+s):2;
  const opacity=isOver?(0.45+0.55*(rank/Math.max(total-1,1))):1.0;
  const typeClass={school:'school',meal:'meal',sleep:'sleep',free:'free'}[ev.type]||'act';
  const m=getMember(mid);
  const color=m?m.color:'#888';
  const borderStyle=isExc?'border-style:dashed;':'';
  const olp=isOver?' overlap':'';
  const partLabel=ev._part==='start'?'🌙 출발 ':ev._part==='end'?'🏠 귀가 ':ev._part==='mid'?'🌙 ':'';
  const excLabel=isExc?'📅 ':'';
  return `<div class="ev ${typeClass}${olp}" style="top:${top}px;height:${h}px;z-index:${zIdx};opacity:${opacity.toFixed(2)};border-left-color:${color};${borderStyle}background:${lighten(color,0.82)};color:${darken(color,0.4)};"
    onclick="onEvClick(event,${di},'${mid}',${ev.id})"
    title="${ev.name} ${fmt(s)}–${fmt(e)}">
    <span class="ev-title">${isOver?'⚠ ':''}${excLabel}${partLabel}${ev.name}</span>
    ${h>=14?`<span class="ev-time">${fmt(s)}–${fmt(e)}</span>`:''}
  </div>`;
}

// 공통 이벤트 - 인접 멤버 열 병합 표시
// targets: 해당 이벤트의 대상 멤버 id 배열
// memberIdx: 전체 members에서 현재 멤버의 인덱스
// 인접한 멤버들이 모두 포함되면 첫 번째 멤버 열에서만 그리고 right를 확장
function isAdjacentGroup(targets) {
  // targets의 멤버들이 members 배열에서 연속인지 확인
  const indices = targets.map(id => members.findIndex(m=>m.id===id)).filter(i=>i>=0).sort((a,b)=>a-b);
  if (indices.length<2) return false;
  for (let i=1;i<indices.length;i++) if (indices[i]!==indices[i-1]+1) return false;
  return true;
}

function evHtmlShared(ev, di, mid, overMap) {
  if (!isEvVisible(ev, di)) return '';
  const targets=resolveWho(ev.who);
  const myIdx=members.findIndex(m=>m.id===mid);
  const adjacent=isAdjacentGroup(targets);

  if (adjacent) {
    const tIndices=targets.map(id=>members.findIndex(m=>m.id===id)).filter(i=>i>=0).sort((a,b)=>a-b);
    const firstIdx=tIndices[0], lastIdx=tIndices[tIndices.length-1];
    // 첫 번째 멤버 열이 아니면 렌더링 안 함 (병합된 블록은 첫째에서만 그림)
    if (myIdx !== firstIdx) return '';
    // right를 마지막 열까지 확장: (lastIdx-firstIdx) * 100% 만큼
    // 실제 px 계산은 어려우므로 calc 사용
    const spanCount = lastIdx - firstIdx + 1;
    const exc=getExc(ev.id);
    const s=exc&&exc.s!=null?exc.s:ev.s;
    const e=exc&&exc.e!=null?exc.e:ev.e;
    const info=overMap?overMap.get(ev.id):null;
    const isOver=!!info;
    const rank=info?info.rank:0;
    const total=info?info.total:1;
    const top=minY(s), h=Math.max(minY(e)-top,SH);
    const zIdx=isOver?(100+s):3;
    const opacity=isOver?(0.45+0.55*(rank/Math.max(total-1,1))):1.0;
    const olp=isOver?' overlap':'';
    const partLabel=ev._part==='start'?'🌙 출발 ':ev._part==='end'?'🏠 귀가 ':ev._part==='mid'?'🌙 ':'';
    // width를 spanCount 열만큼 확장 (각 열 너비가 동일하다고 가정)
    const widthStyle=spanCount>1
      ?`left:2px;width:calc(${spanCount * 100}% - 4px + ${(spanCount-1)}px);right:auto;`
      :'left:2px;right:2px;';
    return `<div class="ev-shared${olp}" style="top:${top}px;height:${h}px;z-index:${zIdx};opacity:${opacity.toFixed(2)};${widthStyle}"
      onclick="onEvClick(event,${di},'${mid}',${ev.id})"
      title="공통: ${ev.name} ${fmt(s)}–${fmt(e)}">
      <span class="ev-title">${isOver?'⚠ ':''}👥 ${partLabel}${ev.name}</span>
      ${h>=14?`<span class="ev-time">${fmt(s)}–${fmt(e)}</span>`:''}
    </div>`;
  }

  // 비인접: 각 열에 개별 표시
  const exc=getExc(ev.id);
  const s=exc&&exc.s!=null?exc.s:ev.s;
  const e=exc&&exc.e!=null?exc.e:ev.e;
  const info=overMap?overMap.get(ev.id):null;
  const isOver=!!info;
  const rank=info?info.rank:0;
  const total=info?info.total:1;
  const top=minY(s), h=Math.max(minY(e)-top,SH);
  const zIdx=isOver?(100+s):3;
  const opacity=isOver?(0.45+0.55*(rank/Math.max(total-1,1))):1.0;
  const olp=isOver?' overlap':'';
  const partLabel=ev._part==='start'?'🌙 출발 ':ev._part==='end'?'🏠 귀가 ':ev._part==='mid'?'🌙 ':'';
  return `<div class="ev-shared${olp}" style="top:${top}px;height:${h}px;z-index:${zIdx};opacity:${opacity.toFixed(2)};"
    onclick="onEvClick(event,${di},'${mid}',${ev.id})"
    title="공통: ${ev.name} ${fmt(s)}–${fmt(e)}">
    <span class="ev-title">${isOver?'⚠ ':''}👥 ${partLabel}${ev.name}</span>
    ${h>=14?`<span class="ev-time">${fmt(s)}–${fmt(e)}</span>`:''}
  </div>`;
}

// ── 타임 거터/슬롯 ─────────────────────────────────────────
function gutterHtml() {
  let g='<div class="tg-head"></div>';
  for (let i=0;i<TOTAL;i++) {
    const am=S_MIN+i*SLOT,h=Math.floor(am/60),mn=am%60;
    let cls='',lbl='';
    if (mn===0)  {cls='hour';lbl=`${String(h).padStart(2,'0')}:00`;}
    else if (mn===30){cls='half';}
    g+=`<div class="tl ${cls}" style="height:${SH}px">${lbl}</div>`;
  }
  return g;
}
function slotRowsHtml() {
  let r='';
  for (let i=0;i<TOTAL;i++) {
    const mn=(S_MIN+i*SLOT)%60;
    r+=`<div class="slot-row ${mn===0?'hour':mn===30?'half':''}" style="height:${SH}px;top:${i*SH}px;"></div>`;
  }
  return r;
}

// ── 렌더 ─────────────────────────────────────────────────
function renderDayView() {
  const totalH=TOTAL*SH;
  const shared=getShared(curDay);
  // 공통 이벤트를 해당 멤버 열에만 배분
  const sharedByMember={};
  members.forEach(m=>{sharedByMember[m.id]=[];});
  shared.forEach(ev=>{
    resolveWho(ev.who).forEach(mid=>{ if(sharedByMember[mid]) sharedByMember[mid].push(ev); });
  });
  let cols='';
  members.forEach(m=>{
    const own=((sched[curDay]&&sched[curDay][m.id])||[]).filter(ev=>!isShared(ev.who));
    const overMap=computeOverlaps(curDay,m.id);
    const ownBlocks=own.map(ev=>evHtml(ev,curDay,m.id,overMap)).join('');
    const sharedBlocks=(sharedByMember[m.id]||[]).map(ev=>evHtmlShared(ev,curDay,m.id,overMap)).join('');
    const isEmpty=own.length===0&&(sharedByMember[m.id]||[]).length===0;
    const blocks=isEmpty
      ?`<div class="empty-hint"><p>일정을 만들면<br>여기 나타나요</p></div>`
      :ownBlocks+sharedBlocks;
    cols+=`<div class="member-col">
      <div class="col-head"><div class="col-dot" style="background:${m.color}"></div>${m.name||'멤버'}</div>
      <div class="slots-grid" style="height:${totalH}px" data-day="${curDay}" data-child="${m.id}">${slotRowsHtml()}${blocks}</div>
    </div>`;
  });
  const wrap=document.createElement('div');
  wrap.className='grid-scroll'; wrap.id='gridScroll';
  wrap.innerHTML=`<div class="grid-wrap"><div class="time-gutter">${gutterHtml()}</div>
    <div class="cols-wrap">${cols}</div></div>`;
  return wrap;
}


function renderWeekView() {
  const totalH=TOTAL*SH, dates=weekDates();
  let dayCols='';
  DAYS.forEach((d,di)=>{
    const we=IS_WE[di];
    const shared=getShared(di);
    const sharedByMember={};
    members.forEach(m=>{sharedByMember[m.id]=[];});
    shared.forEach(ev=>{
      resolveWho(ev.who).forEach(mid=>{ if(sharedByMember[mid]) sharedByMember[mid].push(ev); });
    });
    let memberCols='';
    members.forEach(m=>{
      const own=((sched[di]&&sched[di][m.id])||[]).filter(ev=>!isShared(ev.who));
      const overMap=computeOverlaps(di,m.id);
      const ownBlocks=own.map(ev=>evHtml(ev,di,m.id,overMap)).join('');
      const sharedBlocks=(sharedByMember[m.id]||[]).map(ev=>evHtmlShared(ev,di,m.id,overMap)).join('');
      memberCols+=`<div class="week-col">
        <div class="week-col-head" style="color:${m.color};">${m.name||'멤버'}</div>
        <div class="week-slots" style="height:${totalH}px" data-day="${di}" data-child="${m.id}">${slotRowsHtml()}${ownBlocks}${sharedBlocks}</div>
      </div>`;
    });
    dayCols+=`<div class="week-day-group">
      <div class="week-day-head${we?' we':''}"><span>${d}</span><span class="wdate">${dates[di].m}/${dates[di].d}</span></div>
      <div class="week-child-cols">${memberCols}</div>
    </div>`;
  });
  const wrap=document.createElement('div');
  wrap.className='week-scroll';
  wrap.innerHTML=`<div class="week-wrap"><div class="week-gutter"><div class="tg-head" style="height:40px;"></div>${gutterHtml().replace('<div class="tg-head"></div>','')}</div><div class="week-cols">${dayCols}</div></div>`;
  return wrap;
}


function renderView() {
  const area=document.getElementById('viewArea');
  area.innerHTML='';
  area.appendChild(viewMode==='week'?renderWeekView():renderDayView());
  // Now-line
  const todayIdx=(()=>{const d=new Date().getDay();return d===0?6:d-1;})();
  const now=new Date(), nm=now.getHours()*60+now.getMinutes();
  if (nm>=S_MIN&&nm<=E_MIN&&weekOffset===0) {
    const y=minY(nm);
    const sel=viewMode==='day'&&curDay===todayIdx?'.slots-grid':`[data-day="${todayIdx}"]`;
    document.querySelectorAll(sel).forEach(g=>{
      const ln=document.createElement('div'); ln.className='now-line'; ln.style.top=y+'px'; g.appendChild(ln);
    });
  }
  if (viewMode==='day') {
    setTimeout(()=>{
      const sc=document.getElementById('gridScroll');
      if (sc) sc.scrollTop=minY(7*60)-40;
    },40);
  }
}

// ── 탭 ───────────────────────────────────────────────────
function buildTabs() {
  const dates=weekDates();
  let h=`<button class="day-tab week-tab${viewMode==='week'?' active':''}" onclick="switchView('week')">주간</button>`;
  h+=DAYS.map((d,i)=>`<button class="day-tab${IS_WE[i]?' we':''}${viewMode==='day'&&i===curDay?' active':''}" onclick="switchDay(${i})">${d}<br><span style="font-size:.52rem;font-weight:300">${dates[i].m}/${dates[i].d}</span></button>`).join('');
  document.getElementById('dayTabs').innerHTML=h;
  const wd=weekDates();
  const lbl=document.getElementById('dateLbl');
  lbl.textContent=viewMode==='week'?`${wd[0].m}/${wd[0].d}–${wd[6].m}/${wd[6].d}`:fullDate(curDay);
  lbl.style.color=weekOffset===0?'var(--muted)':'#2e8b57';
}
function switchDay(i){curDay=i;viewMode='day';buildTabs();renderView();closeSidebar();}
function switchView(v){viewMode=v;buildTabs();renderView();}
function changeWeek(dir){if(dir===0)weekOffset=0;else weekOffset+=dir;buildTabs();renderView();}

// ── 컨텍스트 메뉴 ─────────────────────────────────────────
function onEvClick(e,di,mid,id) {
  e.stopPropagation();
  ctxInfo={di,mid,id};
  const ev=getCtxEv();
  const m=document.getElementById('ctx');
  // 일정 이름 표시
  const titleEl=document.getElementById('ctxTitle');
  if (titleEl && ev) titleEl.textContent=ev.name;
  m.classList.add('open');
  m.style.left=Math.min(e.clientX,window.innerWidth-200)+'px';

// ── 링크 공유 ─────────────────────────────────────────────
function doShare(){
  const data={members,memberSeq,library,sched,libSeq,evSeq,weekExceptions};
  try {
    const json=JSON.stringify(data);
    const bytes=new TextEncoder().encode(json);
    let bin=''; bytes.forEach(b=>bin+=String.fromCharCode(b));
    const encoded=btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    const url=location.href.split('#')[0]+'#d='+encoded;
    if (navigator.clipboard&&navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url).then(()=>{
        showToast('🔗 링크가 클립보드에 복사됐어요!');
        const btn=document.getElementById('shareBtn');
        if (btn){btn.textContent='✓';setTimeout(()=>{btn.innerHTML='🔗 <span>링크 공유</span>';},2500);}
      }).catch(()=>prompt('링크를 복사하세요:',url));
    } else prompt('링크를 복사하세요:',url);
  } catch(e){showToast('⚠️ 링크 생성 실패');}
}

function loadFromUrl(){
  try {
    const hash=location.hash;
    if (!hash||!hash.startsWith('#d=')) return false;
    const b64=hash.slice(3).replace(/-/g,'+').replace(/_/g,'/');
    const bin=atob(b64);
    const bytes=new Uint8Array(bin.length);
    for (let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
    const data=JSON.parse(new TextDecoder().decode(bytes));
    applyData(data);
    showToast('✅ 공유된 스케줄을 불러왔어요!');
    return true;
  } catch(e){return false;}
}

// ── 저장/불러오기 ──────────────────────────────────────────
function applyData(data) {
  if (data.members&&data.members.length>0) {
    members=data.members;
    memberSeq=data.memberSeq||members.length;
  }
  if (data.library) library=data.library;
  if (data.sched) {
    sched={};
    for (let d=0;d<7;d++) {
      sched[d]={};
      members.forEach(m=>{sched[d][m.id]=[];});
      const ds=data.sched[d]||{};
      // 구버전 마이그레이션
      if (ds.child1&&members[0]) sched[d][members[0].id]=ds.child1;
      if (ds.child2&&members[1]) sched[d][members[1].id]=ds.child2;
      members.forEach(m=>{if (ds[m.id]) sched[d][m.id]=ds[m.id];});
      // who 정규화
      members.forEach(m=>{
        sched[d][m.id].forEach(ev=>{
          if (ev.who==='child1'&&members[0]) ev.who=members[0].id;
          if (ev.who==='child2'&&members[1]) ev.who=members[1].id;
          if (ev.s==null) ev.s=ev.ds||S_MIN;
          if (ev.e==null) ev.e=ev.de||E_MIN;
        });
      });
    }
  } else { initSched(); }
  if (data.libSeq!=null) libSeq=data.libSeq;
  if (data.evSeq !=null) evSeq =data.evSeq;
  if (data.weekExceptions) weekExceptions=data.weekExceptions;
  // library who 정규화
  library.forEach(it=>{
    if (it.who==='child1'&&members[0]) it.who=members[0].id;
    if (it.who==='child2'&&members[1]) it.who=members[1].id;
    if (it.de==null&&it.e!=null) it.de=it.e;
    if (it.ds==null&&it.s!=null) it.ds=it.s;
  });
  applyAllMemberCSS();
}

function sanitizeData() { applyData({members,memberSeq,library,sched,libSeq,evSeq,weekExceptions}); }

let saveTimer=null;

}

}

// ── 타임 피커 ─────────────────────────────────────────────
function buildPicker(id,initMin){
  const wrap=document.getElementById(id); if (!wrap) return;
  const m=snap5(Math.max(S_MIN,Math.min(E_MIN,initMin)));
  const hV=Math.floor(m/60),mV=m%60;
  const hO=Array.from({length:24},(_,i)=>`<option value="${i}"${i===hV?' selected':''}>${String(i).padStart(2,'0')}</option>`).join('');
  const mO=Array.from({length:12},(_,i)=>{const v=i*5;return `<option value="${v}"${v===mV?' selected':''}>${String(v).padStart(2,'0')}</option>`;}).join('');
  wrap.innerHTML=`<select class="tp-h">${hO}</select><span class="tpick-sep">:</span><select class="tp-m">${mO}</select>`;
  wrap.querySelectorAll('select').forEach(sel=>{
    sel.addEventListener('wheel',e=>{
      e.preventDefault();
      const dir=e.deltaY>0?1:-1,idx=sel.selectedIndex+dir;
      if (idx>=0&&idx<sel.options.length){sel.selectedIndex=idx;}
    },{passive:false});
  });
}
function getPickerVal(id){
  const w=document.getElementById(id); if (!w) return S_MIN;
  return parseInt(w.querySelector('.tp-h').value)*60+parseInt(w.querySelector('.tp-m').value);
}

// ── 모달 위치/드래그 ──────────────────────────────────────
function positionModal(modalId){
  const m=document.getElementById(modalId); if (!m) return;
  m.style.left=''; m.style.top=''; m.style.transform='';
  const vw=window.innerWidth,vh=window.innerHeight;
  const mw=m.offsetWidth||340,mh=m.offsetHeight||400;
  m.style.left=Math.max(0,(vw-mw)/2)+'px';
  m.style.top =Math.max(0,(vh-mh)/3)+'px';
}
function initDrag(handleId,modalId){
  const handle=document.getElementById(handleId),modal=document.getElementById(modalId);
  if (!handle||!modal) return;
  let sx,sy,ox,oy,drag=false;
  function down(e){if(e.target.closest('button,input,select'))return;drag=true;const pt=e.touches?e.touches[0]:e;sx=pt.clientX;sy=pt.clientY;const r=modal.getBoundingClientRect();ox=r.left;oy=r.top;modal.style.transition='none';e.preventDefault();}
  function move(e){if(!drag)return;const pt=e.touches?e.touches[0]:e;const dx=pt.clientX-sx,dy=pt.clientY-sy;const vw=window.innerWidth,vh=window.innerHeight;const mw=modal.offsetWidth,mh=modal.offsetHeight;modal.style.left=Math.max(0,Math.min(vw-mw,ox+dx))+'px';modal.style.top=Math.max(0,Math.min(vh-mh,oy+dy))+'px';modal.style.transform='none';}
  function up(){drag=false;}
  handle.addEventListener('mousedown',down);handle.addEventListener('touchstart',down,{passive:false});
  document.addEventListener('mousemove',move);document.addEventListener('touchmove',move,{passive:false});
  document.addEventListener('mouseup',up);document.addEventListener('touchend',up);
}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfoZ0MhA49w_kiNuoMh9x2VCSm2xilplU",
  authDomain: "hanaschedule-6afc1.firebaseapp.com",
  projectId: "hanaschedule-6afc1",
  storageBucket: "hanaschedule-6afc1.firebasestorage.app",
  messagingSenderId: "912726273574",
  appId: "1:912726273574:web:9e346af2d75c5203fb80e7"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const DOC = doc(db, 'family', 'main');

async function fsLoad() {
  try {
    const snap = await getDoc(DOC);
    if (!snap.exists()) return false;
    const data = snap.data();
    if (window._setAppState) window._setAppState(data);
    if (window._renderAll)   window._renderAll();
    return true;
  } catch(e) { console.error('Firestore load:', e); return false; }
}

async function fsSave() {
  try {
    if (window._setFsSaving) window._setFsSaving(true);
    const st = window._getAppState ? window._getAppState() : {};
    const now = Date.now();
    st.lastSaved = now;
    if (window._setAppState) window._setAppState({lastSaved: now});
    await setDoc(DOC, {...st, updatedAt: now});
    const b = document.getElementById('saveBadge');
    if (b) { b.textContent='☁️ 저장됨'; setTimeout(()=>{b.textContent='';},2000); }
  } catch(e) { console.error('Firestore save:', e); }
  finally { setTimeout(()=>{ if(window._setFsSaving) window._setFsSaving(false); }, 1000); }
}

// autoSave에 Firestore 연결
window._firestoreSave = fsSave;

// 초기 로드 + 실시간 동기화
const badge = document.getElementById('saveBadge');
if (badge) badge.textContent = '☁️ 동기화 중…';

let isSaving = false; // 내가 저장 중일 때 onSnapshot 무시용
window._setFsSaving = (v) => { isSaving = v; };

fsLoad().then(loaded => {
  if (!loaded) {
    const st = window._getAppState ? window._getAppState() : {};
    if (st.library && st.library.length > 0) fsSave();
  }
  if (badge) badge.textContent = '';

  // 실시간 동기화 리스너
  onSnapshot(DOC, (snap) => {
    if (!snap.exists()) return;
    if (isSaving) return; // 내가 방금 저장한 변경은 무시
    const data = snap.data();
    // updatedAt이 현재보다 새로울 때만 업데이트
    const st = window._getAppState ? window._getAppState() : {};
    if (data.updatedAt && st.lastSaved && data.updatedAt <= st.lastSaved) return;
    if (window._setAppState) window._setAppState(data);
    if (window._renderAll) window._renderAll();
    showToast('🔄 다른 기기에서 업데이트됐어요');
  });
});
</script>
